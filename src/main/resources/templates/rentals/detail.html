<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rental Detail</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}">
</head>
<body>

<div class="container">

    <h1>Rental #<span th:text="${rental.id}"></span></h1>

    <p><strong>User:</strong>
        <span th:text="${rental.userName}"></span>
    </p>

    <p><strong>Vehicle:</strong>
        <span th:text="${rental.vehicleModel}"></span>
    </p>

    <p><strong>Vehicle type:</strong>
        <span th:text="${rental.vehicleType}"></span>
    </p>

    <p><strong>Price/min:</strong>
        <span th:text="${rental.pricePerMin}"></span>
    </p>

    <p><strong>Start Time:</strong>
        <span th:text="${#temporals.format(rental.startDate, 'yyyy-MM-dd HH:mm')}"></span>
    </p>

    <p><strong>End Time:</strong>
        <span th:text="${rental.endDate != null ? #temporals.format(rental.endDate, 'yyyy-MM-dd HH:mm') : 'Still Active'}"></span>
    </p>

    <p><strong>Status:</strong>
        <span th:text="${rental.status}"></span>
    </p>

</div>

</body>
</html>
