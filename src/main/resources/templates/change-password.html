<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Driveza | Change Password</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}"/>
</head>

<body>

<header class="topbar">
    <div class="topbar__left">
        <a class="brand" th:href="@{/cars}">
            <img class="brand__logo" th:src="@{/images/logo.svg}" alt="Driveza"/>
            <span class="brand__name">Driveza</span>
        </a>
    </div>

    <nav class="topbar__nav">
        <a class="nav__link" th:href="@{/cars}">Cars</a>
        <a class="nav__link nav__link--active" th:href="@{/account}">Account</a>
    </nav>

    <div class="topbar__right">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn--ghost" type="submit">Logout</button>
        </form>
    </div>
</header>

<main class="container">

    <section class="pageHead">
        <div>
            <h1 class="pageTitle">Change Password</h1>
            <p class="pageSub">Update your account password securely.</p>
        </div>
    </section>

    <!-- Success Alert -->
    <div class="alert alert--info" th:if="${param.success}">
        Password updated successfully.
    </div>

    <!-- Error Alert -->
    <div class="alert alert--error"
         th:if="${param.error}"
         th:text="${param.error[0]}">
        Something went wrong.
    </div>

    <section class="card pad" style="max-width:520px; margin-top:16px;">

        <form th:action="@{/account/change-password}" method="post">

            <!-- CSRF token (VERY IMPORTANT) -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="field">
                <label class="label">Old Password</label>
                <input class="input"
                       type="password"
                       name="oldPassword"
                       required/>
            </div>

            <div class="field">
                <label class="label">New Password</label>
                <input class="input"
                       type="password"
                       name="newPassword"
                       minlength="6"
                       required/>
                <div class="muted" style="margin-top:6px;">
                    Must be at least 6 characters.
                </div>
            </div>

            <div class="field">
                <label class="label">Confirm New Password</label>
                <input class="input"
                       type="password"
                       name="confirmPassword"
                       minlength="6"
                       required/>
            </div>

            <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
                <button class="btn" type="submit">
                    Update Password
                </button>

                <a class="btn btn--ghost"
                   th:href="@{/account}">
                    Cancel
                </a>
            </div>

        </form>

    </section>

</main>

</body>
</html>
