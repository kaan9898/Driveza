<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Top Bar -->
<header th:fragment="userHeader(currentPath)" class="topbar fadeUp">
    <div class="topbar__left">
        <a class="brand" th:href="@{/cars}">
            <img class="brand__logo" th:src="@{/images/logo.svg}" alt="Driveza"/>
<!--            <span class="brand__name">Driveza</span>-->
        </a>
    </div>

    <nav class="topbar__nav">
        <a class="nav__link" th:classappend="${currentPath == '/cars'} ? 'nav__link--active'" th:href="@{/cars}">Cars</a>
        <a class="nav__link" th:classappend="${currentPath == '/map'} ? 'nav__link--active'"  th:href="@{/map}">Map</a>
        <a class="nav__link" th:classappend="${currentPath =='/account'} ? 'nav__link--active'"  th:href="@{/account}">Account</a>
    </nav>


    <div class="topbar__right" style="display:flex; align-items:center; gap:10px;">

    <a class="btn btn--ghost"
           th:href="@{/support}"
           th:classappend="${currentPath == '/support'} ? 'btn&#45;&#45;active'">
            Support
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn--ghost" type="submit">Logout</button>
        </form>

    </div>


</header>

</body>
</html>
