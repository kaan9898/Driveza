<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Driveza | Map</title>

  <link rel="stylesheet" th:href="@{/css/driveza-app.css}"/>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 550px;
      width: 100%;
      border-radius: 12px;
      margin-top: 16px;
      overflow: hidden;
    }
    .mapActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.06);
      font-size: 13px;
    }
    .mutedSmall { font-size: 13px; opacity: .75; }
    /* Hide data nodes */
    #vehiclePoints,
    #returnFlowData,
    #returnSuccessData { display:none; }
  </style>
</head>

<body>

<div th:replace="header :: userHeader('/map')"></div>

<main class="container">

  <section class="pageHead">
    <div>
      <h1 class="pageTitle">Available Vehicles Map</h1>
      <p class="pageSub">View available vehicles on the map</p>
    </div>
  </section>

  <section class="card pad">

    <div class="mapActions">
      <button class="btn" type="button" id="btnLocate">Use my location</button>
      <a class="btn btn--ghost" th:href="@{/map}">Reset view</a>

      <span class="pill">
        Vehicles on map:
        <b th:text="${vehicles != null ? #lists.size(vehicles) : 0}">0</b>
      </span>

      <span class="mutedSmall" id="locationStatus"></span>
    </div>

    <div th:if="${returnSuccess}" class="alert alert--info" style="margin-top:12px;">
      Return recorded at
      <span th:text="${#numbers.formatDecimal(returnSuccessLat,1,5)}">lat</span>,
      <span th:text="${#numbers.formatDecimal(returnSuccessLon,1,5)}">lon</span>.
    </div>

    <div th:if="${returningRental != null}" class="card" style="margin-top:12px; background:#f1f5f9;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;">
        <div>
          <p class="mutedSmall" style="margin:0 0 4px;">
            Please tap any map location to drop
            <strong th:text="${returningRental.vehicleModel}">Vehicle</strong>.
          </p>
          <p class="mutedSmall" style="margin:0;"
             id="returnFeedback">Click on the map to set a drop point and enable return.</p>
        </div>
        <form id="returnForm"
              th:action="@{'/rentals/' + ${returningRental.id} + '/return'}"
              method="post"
              style="display:flex; gap:8px; align-items:center;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="latitude" id="returnLatitude"/>
          <input type="hidden" name="longitude" id="returnLongitude"/>
          <button id="returnSubmit" class="btn" type="submit" disabled>Return here</button>
        </form>
      </div>
    </div>

    <div th:if="${vehicles == null or #lists.isEmpty(vehicles)}"
         class="alert alert--info" style="margin-top:12px;">
      No vehicles available at the moment.
    </div>

    <!-- ✅ Hidden vehicle data rendered safely -->
    <div id="vehiclePoints">
      <div th:each="v : ${vehicles}"
           class="vehiclePoint"
           th:attr="data-id=${v.id},
                    data-lat=${v.latitude},
                    data-lon=${v.longitude},
                    data-type=${v.type},
                    data-status=${v.status},
                    data-price=${v.pricePerMin},
                    data-brand=${v.brand != null ? v.brand : 'Unknown'},
                    data-model=${v.modelName != null ? v.modelName : 'Unknown'}">
      </div>
    </div>

    <div id="returnFlowData"
         th:if="${returningRental != null}"
         th:data-rental-id="${returningRental.id}"
         th:data-vehicle="${returningRental.vehicleModel}"></div>

    <div id="returnSuccessData"
         th:if="${returnSuccess}"
         th:data-lat="${returnSuccessLat}"
         th:data-lon="${returnSuccessLon}"></div>

    <div id="map"></div>

  </section>

</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  /* global L */
  // Default center (Riga)
  const defaultCenter = [56.9496, 24.1052];
  const defaultZoom = 12;

  const map = L.map('map').setView(defaultCenter, defaultZoom);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const markersLayer = L.layerGroup().addTo(map);
  const bounds = [];

  // ✅ Read vehicles from hidden HTML (no Thymeleaf JS syntax issues)
  const nodes = document.querySelectorAll(".vehiclePoint");
  nodes.forEach(node => {
    const lat = parseFloat(node.dataset.lat);
    const lon = parseFloat(node.dataset.lon);
    if (Number.isNaN(lat) || Number.isNaN(lon)) return;

    const brand = node.dataset.brand || "Unknown";
    const model = node.dataset.model || "Unknown";
    const type = node.dataset.type || "";
    const status = node.dataset.status || "";
    const price = parseFloat(node.dataset.price || "0");

    const popup =
            `<b>${escapeHtml(brand)} ${escapeHtml(model)}</b><br/>
       Type: ${escapeHtml(type)}<br/>
       Status: ${escapeHtml(status)}<br/>
       Price: €${price.toFixed(2)}/min`;

    L.marker([lat, lon]).addTo(markersLayer).bindPopup(popup);
    bounds.push([lat, lon]);
  });

  // Fit to markers if any
  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  // ✅ Locate button
  const statusEl = document.getElementById("locationStatus");
  document.getElementById("btnLocate").addEventListener("click", () => {
    if (!navigator.geolocation) {
      statusEl.textContent = "Geolocation not supported in this browser.";
      return;
    }
    statusEl.textContent = "Detecting your location...";

    navigator.geolocation.getCurrentPosition(
            (pos) => {
              const lat = pos.coords.latitude;
              const lon = pos.coords.longitude;

              statusEl.textContent = `You are here: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

              L.circleMarker([lat, lon], {
                radius: 8,
                weight: 2,
                fillOpacity: 0.6
              }).addTo(map).bindPopup("You are here").openPopup();

              map.setView([lat, lon], 14);
            },
            (err) => {
              statusEl.textContent = "Location permission denied or failed.";
              console.error(err);
            },
            { enableHighAccuracy: true, timeout: 8000 }
    );
  });

  const returnFlowData = document.getElementById("returnFlowData");
  const returnSuccessData = document.getElementById("returnSuccessData");
  const returnForm = document.getElementById("returnForm");
  const returnFeedback = document.getElementById("returnFeedback");
  const returnButton = document.getElementById("returnSubmit");
  let returnMarker;

  if (returnFlowData && returnForm && returnButton && returnFeedback) {
    const vehicleLabel = returnFlowData.dataset.vehicle || "this vehicle";
    returnFeedback.textContent = `Click on the map to drop ${vehicleLabel}.`;
    returnButton.disabled = true;

    map.on("click", (event) => {
      const lat = event.latlng.lat;
      const lon = event.latlng.lng;
      const latInput = document.getElementById("returnLatitude");
      const lonInput = document.getElementById("returnLongitude");
      if (latInput && lonInput) {
        latInput.value = lat;
        lonInput.value = lon;
        returnButton.disabled = false;
        returnFeedback.textContent = `Selected drop point: ${lat.toFixed(5)}, ${lon.toFixed(5)}.`;

        if (returnMarker) {
          returnMarker.remove();
        }
        returnMarker = L.circleMarker([lat, lon], {
          color: "#1d4ed8",
          fillColor: "#93c5fd",
          radius: 8,
          weight: 2,
          fillOpacity: 0.7
        }).addTo(map).bindPopup("Drop location").openPopup();
        map.panTo([lat, lon]);
      }
    });
  }

  if (returnSuccessData) {
    const lat = parseFloat(returnSuccessData.dataset.lat);
    const lon = parseFloat(returnSuccessData.dataset.lon);
    if (!Number.isNaN(lat) && !Number.isNaN(lon)) {
      L.circleMarker([lat, lon], {
        color: "#047857",
        fillColor: "#6ee7b7",
        radius: 9,
        weight: 2,
        fillOpacity: 0.5
      }).addTo(markersLayer).bindPopup("Returned here").openPopup();
      statusEl.textContent = `Return recorded at ${lat.toFixed(5)}, ${lon.toFixed(5)}.`;
      map.setView([lat, lon], 14);
    }
  }

  function escapeHtml(str) {
    return String(str ?? '')
            .replaceAll('&','&amp;')
            .replaceAll('<','&lt;')
            .replaceAll('>','&gt;')
            .replaceAll('"','&quot;')
            .replaceAll("'","&#039;");
  }
</script>

</body>
</html>
