<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Driveza | Admin Vehicles</title>

    <link rel="stylesheet" th:href="@{/css/driveza-app.css}"/>

    <!-- Page-only upgrade (does NOT modify global CSS) -->
    <style>
        .adminShell{ max-width:1120px; margin:0 auto; }

        /* Hero (same style as Users) */
        .adminHero{
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            padding: 22px 24px;
            margin: 14px 0 14px;
            /*background: #0b1220;*/
        }
        .adminHero::before{
            content:"";
            position:absolute; inset:0;
            /*background-image: url("/images/user-bg.jpg"); !* change if you want vehicles-bg *!*/
            background-size: cover;
            background-position: center;
            /*opacity: .14;*/
            pointer-events:none;
        }
        .adminHero::after{
            content:"";
            position:absolute; inset:0;
            /*background:*/
            /*        radial-gradient(900px 360px at 20% 0%, rgba(255,255,255,.10), transparent 60%),*/
            /*        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.58));*/
            pointer-events:none;
        }
        .adminHero__content{
            position: relative;
            display:flex;
            justify-content: space-between;
            align-items:flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }
        .adminHero__title{
            margin:0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.5px;
            /*color:#fff;*/
        }
        .adminHero__sub{
            margin:6px 0 0;
            /*color: rgba(255,255,255,.78);*/
            font-size: 14px;
        }
        .pill{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: rgba(255,255,255,.10);
            color:#fff;
        }

        /* Tools row */
        .adminTools{
            display:flex;
            gap: 12px;
            align-items:center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 0 0 14px;
        }
        .adminTools__left{
            display:flex;
            gap: 10px;
            align-items:center;
            flex-wrap: wrap;
        }
        .adminTools__right{
            display:flex;
            gap: 10px;
            align-items:center;
            flex-wrap: wrap;
        }

        /* Table polish */
        .tableWrap{
            overflow:auto;
            border-radius: 14px;
        }
        .tableModern thead th{
            position: sticky;
            top: 0;
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(8px);
            z-index: 1;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: .5px;
        }
        .tableModern td{ vertical-align: middle; }

        /* Clickable row */
        .clickRow{ cursor: pointer; transition: .15s; }
        .clickRow:hover{
            transform: translateY(-2px);
            background: rgba(255,255,255,.04);
        }

        /* Status badge */
        .statusBadge{
            padding:4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }
        .stAvail{ background:#2ecc7120; color:#2ecc71; }
        .stRent{ background:#ffb02020; color:#ffb020; }
        .stOos { background:#ff4d4d20; color:#ff4d4d; }

        /* Modal (keep your existing behavior) */
        .modalBackdrop{
            position: fixed; inset: 0;
            background: rgba(0,0,0,.65);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9999;
            padding: 18px;
            animation: fadeIn .2s ease-out;
        }
        .modalBackdrop.show{ display:flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modalBox{
            width: min(820px, 100%);
            max-height: 85vh;
            overflow: auto;
            border-radius: 14px;
            animation: pop .18s ease-out;
        }
        @keyframes pop { from { transform: scale(.97); opacity: .7; } to { transform: scale(1); opacity: 1; } }

        .modalHeader{
            display:flex;
            align-items:center;
            justify-content: space-between;
            gap: 12px;
        }
        .modalClose{
            border: none;
            background: transparent;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
        }

        .twoCol{
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            gap: 14px;
        }
        @media (max-width: 720px){
            .twoCol{ grid-template-columns: 1fr; }
        }

        .fadeUp{ animation: fadeUp .55s ease-out both; }
        @keyframes fadeUp{
            from{ opacity:0; transform: translateY(10px); }
            to{ opacity:1; transform: translateY(0); }
        }
    </style>
</head>

<body class="adminBg">
<div class="adminOverlay"></div>

<div class="adminContent">
    <div th:replace="admin/header :: adminHeader('/admin/vehicles')"></div>

    <main class="container adminShell">

        <!-- HERO -->
        <section class="adminHero fadeUp">
            <div class="adminHero__content">
                <div>
                    <h1 class="adminHero__title">Vehicles</h1>
                    <p class="adminHero__sub">Click a row to edit or delete. Add new vehicles to the fleet.</p>
                </div>
            </div>
        </section>

        <!-- Tools row -->
        <section class="adminTools fadeUp">
            <div class="adminTools__right">
                <a class="btn" th:href="@{/admin/vehicles/new}">+ Add Vehicle</a>
            </div>
        </section>


        <!-- TABLE -->
        <div id="adminVehiclesResults" data-pjax-container>
            <section class="card pad fadeUp">
                <div class="tableWrap">
                    <table class="table tableModern" style="width:100%">
                        <thead>
                        <tr>
                            <th style="width:70px;">#</th>
                            <th>Brand</th>
                            <th>Model</th>
                            <th style="width:140px;">Type</th>
                            <th style="width:140px;">Status</th>
                            <th style="width:120px;">Price/min</th>
                            <th style="width:140px;">Lat</th>
                            <th style="width:140px;">Lon</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(vehicles)}">
                            <td colspan="8" class="muted" style="text-align:center; padding:20px;">
                                No vehicles found.
                            </td>
                        </tr>

                        <tr class="clickRow"
                            th:each="v, stat : ${vehicles}"
                            th:attr="
                                data-id=${v.id},
                                data-modelid=${v.modelId != null ? v.modelId : 0},
                                data-brand=${v.brand != null ? v.brand : ''},
                                data-modelname=${v.modelName != null ? v.modelName : ''},
                                data-type=${v.type},
                                data-status=${v.status},
                                data-price=${v.pricePerMin},
                                data-lat=${v.latitude},
                                data-lon=${v.longitude}
                            "
                            onclick="openVehicleModal(this)">

                            <td th:text="${stat.count}">1</td>
                            <td th:text="${v.brand != null ? v.brand : '—'}">Toyota</td>
                            <td th:text="${v.modelName != null ? v.modelName : '—'}">Prius</td>
                            <td th:text="${v.type}">CAR</td>

                            <td>
                            <span class="statusBadge"
                                  th:classappend="${v.status.name() == 'AVAILABLE'} ? ' stAvail' :
                                                 (${v.status.name() == 'RENTED'} ? ' stRent' : ' stOos')"
                                  th:text="${v.status}">
                                AVAILABLE
                            </span>
                            </td>

                            <td th:text="${v.pricePerMin}">0.25</td>
                            <td th:text="${v.latitude}">56.9</td>
                            <td th:text="${v.longitude}">24.1</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <div th:replace="fragments/pagination :: pager(${prevHref}, ${nextHref}, ${currentPage}, ${totalPages}, true)"></div>
        </div>
        <script th:src="@{/js/pjax-pagination.js}"></script>
    </main>
</div>

<!-- ✅ Modal -->
<div id="vehicleModal" class="modalBackdrop" onclick="backdropClose(event)">
    <div class="modalBox card pad" onclick="event.stopPropagation()">

        <div class="modalHeader">
            <div>
                <h2 style="margin:0">Edit Vehicle</h2>
                <div class="muted" id="modalSub">—</div>
            </div>
            <button class="modalClose" onclick="closeVehicleModal()" aria-label="Close">×</button>
        </div>

        <hr style="opacity:.2; margin:14px 0;"/>

        <!-- Edit form (NOT nested) -->
        <form id="editForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="twoCol">
                <div class="field">
                    <label class="label">Brand</label>
                    <input class="input" id="brand" type="text" readonly>
                </div>

                <div class="field">
                    <label class="label">Model</label>
                    <input class="input" id="modelName" type="text" readonly>
                </div>

                <input type="hidden" id="modelId" name="modelId">

                <div class="field">
                    <label class="label">Type</label>
                    <select class="select" id="type" name="type" required>
                        <option value="CAR">CAR</option>
                        <option value="PREMIUM_CAR">PREMIUM CAR</option>
                        <option value="MOTORCYCLE">MOTORCYCLE</option>
                    </select>
                </div>

                <div class="field">
                    <label class="label">Status</label>
                    <select class="select" id="status" name="status" required>
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="RENTED">RENTED</option>
                        <option value="OUT_OF_SERVICE">OUT_OF_SERVICE</option>
                    </select>
                </div>

                <div class="field">
                    <label class="label">Price per minute (€)</label>
                    <input class="input" id="pricePerMin" name="pricePerMin" type="number" step="0.01" min="0" required>
                </div>

                <div class="field">
                    <label class="label">Latitude</label>
                    <input class="input" id="latitude" name="latitude" type="number" step="0.000001" required>
                </div>

                <div class="field">
                    <label class="label">Longitude</label>
                    <input class="input" id="longitude" name="longitude" type="number" step="0.000001" required>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:16px; flex-wrap: wrap;">
                <button class="btn" type="submit">Save Changes</button>
                <button class="btn btn--ghost" type="button" onclick="closeVehicleModal()">Cancel</button>
            </div>
        </form>

        <!-- ✅ Delete form -->
        <form id="deleteForm" th:action="@{/admin/vehicles/delete}" method="post" style="margin-top:10px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="vehicleId" id="deleteVehicleId"/>
            <button class="btn btn--danger" type="submit">Delete Vehicle</button>
        </form>

    </div>
</div>

<script>
    function openVehicleModal(row){
        const id = row.dataset.id;

        document.getElementById('brand').value = row.dataset.brand || '';
        document.getElementById('modelName').value = row.dataset.modelname || '';

        document.getElementById('modelId').value = row.dataset.modelid || 0;

        document.getElementById('type').value = row.dataset.type || 'CAR';
        document.getElementById('status').value = row.dataset.status || 'AVAILABLE';

        document.getElementById('pricePerMin').value = row.dataset.price || 0;
        document.getElementById('latitude').value = row.dataset.lat || 0;
        document.getElementById('longitude').value = row.dataset.lon || 0;

        document.getElementById('modalSub').textContent =
            `Vehicle ID: ${id} • ${row.dataset.brand} ${row.dataset.modelname}`;

        document.getElementById('editForm').action = `/admin/vehicles/${id}/edit`;
        document.getElementById('deleteVehicleId').value = id;

        document.getElementById('vehicleModal').classList.add('show');
    }

    function closeVehicleModal(){
        document.getElementById('vehicleModal').classList.remove('show');
    }

    function backdropClose(){
        closeVehicleModal();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeVehicleModal();
    });
</script>

</body>
</html>
