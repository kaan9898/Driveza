<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="adminHeader(currentPath)"  class="topbar topbar--enter">
    <div class="topbar__left">
        <a class="brand" th:href="@{/admin/dashboard}">
            <img class="brand__logo" th:src="@{/images/logo.svg}" alt="Driveza"/>
            <span class="brand__name">Driveza Admin</span>
        </a>
    </div>

    <nav class="topbar__nav">
        <a class="nav__link" th:classappend="${currentPath == '/admin/dashboard'} ? 'nav__link--active'" th:href="@{/admin/dashboard}">Dashboard</a>
        <a class="nav__link" th:classappend="${currentPath == '/admin/vehicles'} ? 'nav__link--active'" th:href="@{/admin/vehicles}">Vehicles</a>
        <a class="nav__link" th:classappend="${currentPath == '/users'} ? 'nav__link--active'" th:href="@{/users}">Users</a>
    </nav>

    <div class="topbar__right">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn--ghost" type="submit">Logout</button>
        </form>
    </div>
</header>

</body>
</html>
