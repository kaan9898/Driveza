<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}">
</head>

<body class="adminBg">
<div class="adminOverlay"></div>


<div class="adminContent">
    <div th:replace="admin/header :: adminHeader('/users')"></div>
    <main class="container">
        <section class="pageHead card pad">
            <div>
                <h1 class="pageTitle">User List</h1>
                <p class="pageSub">List of all user details</p>
            </div>
        </section>

        <section class="card pad">
            <table class="table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>DOB</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7">No users found</td>
                </tr>

                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td th:text="${u.dob}"></td>
                    <td>
                        <a class="btn" th:href="@{'/users/' + ${u.id} + '/edit'}">Edit</a>

                        <form th:action="@{'/users/' + ${u.id} + '/delete'}"
                              method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button class="btn" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>

                </tbody>
            </table>
        </section>

        <!-- Pagination -->
        <section class="pageHead">
            <!-- i'm sorry for this :^( -->
            <a class="btn" th:if="${prevPageNumber != -1}" th:href="@{/users?(page=${prevPageNumber})}">Previous</a>
            <a class="btn btn--disabled" th:if="${prevPageNumber == -1}">Previous</a>
            <a class="btn" th:if="${nextPageNumber != -1}" th:href="@{/users?(page=${nextPageNumber})}">Next</a>
            <a class="btn btn--disabled" th:if="${nextPageNumber == -1}">Next</a>
        </section>
    </main>
</div>

</body>
</html>
