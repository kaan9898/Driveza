<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Driveza | Admin Users</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}"/>

    <!-- Page-only upgrade (does NOT modify global CSS) -->
    <style>
        .adminShell{ max-width:1120px; margin:0 auto; }

        /* Hero (same as vehicle form) */
        .adminHero{
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            padding: 22px 24px;
            margin: 14px 0 14px;
            /*background: #0b1220;*/
        }
        .adminHero::before{
            content:"";
            position:absolute; inset:0;
            /*background-image: url("/images/user-bg.jpg");*/
            background-size: cover;
            background-position: center;
            /*opacity: .14;*/
            pointer-events:none;
        }
        .adminHero::after{
            content:"";
            position:absolute; inset:0;
            /*background:*/
            /*        radial-gradient(900px 360px at 20% 0%, rgba(255,255,255,.10), transparent 60%),*/
            /*        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.58));*/
            pointer-events:none;
        }
        .adminHero__content{
            position: relative;
            display:flex;
            justify-content: space-between;
            align-items:flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }
        .adminHero__title{
            margin:0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.5px;
            /*color:#fff;*/
        }
        .adminHero__sub{
            margin:6px 0 0;
            /*color: rgba(255,255,255,.78);*/
            font-size: 14px;
        }
        .pill{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: rgba(255,255,255,.10);
            color:#fff;
        }

        /* Tools row */
        .adminTools{
            display:flex;
            gap: 12px;
            align-items:center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 0 0 14px;
        }

        /* Table polish */
        .tableWrap{
            overflow:auto;
            border-radius: 14px;
        }
        .tableModern thead th{
            position: sticky;
            top: 0;
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(8px);
            z-index: 1;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: .5px;
        }
        .tableModern td{ vertical-align: middle; }

        .roleBadge{
            padding:4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }
        .roleAdmin{ background:#ffb02020; color:#ffb020; }
        .roleUser{ background:#2ecc7120; color:#2ecc71; }

        .actionGroup{
            display:flex;
            gap:8px;
            flex-wrap: wrap;
            align-items:center;
        }

        .fadeUp{ animation: fadeUp .55s ease-out both; }
        @keyframes fadeUp{
            from{ opacity:0; transform: translateY(10px); }
            to{ opacity:1; transform: translateY(0); }
        }
    </style>
</head>

<body class="adminBg">
<div class="adminOverlay"></div>

<div class="adminContent">
    <div th:replace="~{admin/header :: adminHeader('/users')}"></div>

    <main class="container adminShell">

        <!-- HERO -->
        <section class="adminHero fadeUp">
            <div class="adminHero__content">
                <div>
                    <h1 class="adminHero__title">User Management</h1>
                    <p class="adminHero__sub">View, edit, and manage registered users.</p>
                </div>
                <div>
                    <span class="badge badge--ok"
                          th:text="'Total: ' + ${userCount}">
                        Total: 10
                    </span>
                </div>
            </div>
        </section>

        <!-- TABLE -->
        <div data-pjax-container>
            <section class="card pad fadeUp">
                <div class="tableWrap">
                    <table class="table tableModern">

                        <thead>
                        <tr>
                            <th style="width:70px;">ID</th>
                            <th>User</th>
                            <th>Email</th>
                            <th style="width:120px;">Role</th>
                            <th style="width:140px;">DOB</th>
                            <th>Disabled</th>
                            <th style="width:220px;">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" style="text-align:center; padding:20px;">
                                No users found.
                            </td>
                        </tr>

                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>

                            <td>
                                <div style="font-weight:700;" th:text="${u.name}">Name</div>
                            </td>

                            <td th:text="${u.email}">email</td>

                            <td>
                            <span class="roleBadge"
                                  th:classappend="${u.role.name() == 'ADMIN'} ? ' roleAdmin' : ' roleUser'"
                                  th:text="${u.role}">USER</span>
                            </td>

                            <td th:text="${u.dob != null ? #temporals.format(u.dob, 'yyyy-MM-dd') : '—'}">—</td>

                            <td th:text="${u.disabled}">Disabled</td>

                            <td>
                                <div class="actionGroup">
                                    <a class="btn btn--small"
                                       th:href="@{'/users/' + ${u.id} + '/edit'}">Edit</a>

                                    <form th:if="${!u.disabled}" th:action="@{'/users/' + ${u.id} + '/disable'}"
                                      method="post" style="display:inline;">
                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                    <button class="btn btn--ghost btn--small"
                                            type="submit"
                                            onclick="return confirm('Disable this user account?');">
                                       Disable
                                    </button>
                                </form>

                                <form th:if="${u.disabled}" th:action="@{'/users/' + ${u.id} + '/enable'}"
                                          method="post" style="display:inline;">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <button class="btn btn--ghost btn--small"
                                                type="submit"
                                                onclick="return confirm('Enable this user account?');">
                                            Enable
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </section>
            <!-- Pagination -->
            <div th:replace="~{fragments/pagination :: pager(${prevHref}, ${nextHref}, ${currentPage}, ${totalPages}, true)} "></div>
        </div>
        <script th:src="@{/js/pjax-pagination.js}"></script>
    </main>
</div>

</body>
</html>
