<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driveza | Admin Users</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}">

    <style>
        .pageHero {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            /*background: #0b1220;*/
        }

        .pageHero::before{
            content:"";
            position:absolute; inset:0;
            /*background-image: url("/images/user-bg.jpg");*/
            background-size: cover;
            background-position: center;
            filter: saturate(1.05) contrast(1.05);
            /*opacity: .22;*/
            pointer-events: none;
        }

        .pageHero::after {
            content:"";
            position:absolute;
            inset:0;
            background: linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
            pointer-events:none;
        }

        .pageHero__content {
            position: relative;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .tableModern th {
            background: rgba(255,255,255,.05);
            font-weight:600;
            text-transform:uppercase;
            font-size:12px;
            letter-spacing:.5px;
        }

        .tableModern td {
            vertical-align:middle;
        }

        .roleBadge {
            padding:4px 10px;
            border-radius:12px;
            font-size:12px;
            font-weight:600;
        }

        .roleAdmin {
            background:#ffb02020;
            color:#ffb020;
        }

        .roleUser {
            background:#2ecc7120;
            color:#2ecc71;
        }

        .actionGroup {
            display:flex;
            gap:8px;
        }
    </style>
</head>

<body class="adminBg">
<div class="adminOverlay"></div>

<div class="adminContent">
    <div th:replace="admin/header :: adminHeader('/users')"></div>

    <main class="container">

        <!-- HERO HEADER -->
        <section class="pageHero">
            <div class="pageHero__content">
                <div>
                    <h1 class="pageTitle">User Management</h1>
                    <p class="pageSub">View, edit, and manage registered users.</p>
                </div>

                <div>
                    <span class="badge badge--ok"
                          th:text="'Total: ' + ${users.size()}">
                        Total: 10
                    </span>
                </div>
            </div>
        </section>

        <!-- TABLE CARD -->
        <section class="card pad">

            <table class="table tableModern">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>DOB</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <!-- Empty state -->
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" style="text-align:center; padding:20px;">
                        No users found.
                    </td>
                </tr>

                <!-- Users -->
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>

                    <td>
                        <div style="font-weight:600;" th:text="${u.name}"></div>
                    </td>

                    <td th:text="${u.email}"></td>

                    <td>
                        <span class="roleBadge"
                              th:classappend="${u.role.name() == 'ADMIN'} ? ' roleAdmin' : ' roleUser'"
                              th:text="${u.role}">
                            USER
                        </span>
                    </td>

                    <td th:text="${u.dob != null ? #temporals.format(u.dob, 'yyyy-MM-dd') : '—'}"></td>

                    <td>
                        <div class="actionGroup">

                            <a class="btn btn--small"
                               th:href="@{'/users/' + ${u.id} + '/edit'}">
                                Edit
                            </a>

                            <form th:action="@{'/users/' + ${u.id} + '/delete'}"
                                  method="post"
                                  style="display:inline;">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <button class="btn btn--ghost btn--small"
                                        type="submit"
                                        onclick="return confirm('Delete this user?');">
                                    Delete
                                </button>
                            </form>

                        </div>
                    </td>
                </tr>

                </tbody>
            </table>

        </section>

        <!-- PAGINATION -->
        <div class="pageHead" th:if="${totalPages > 1}" style="margin-top:16px;">

            <a class="btn"
               th:if="${currentPage > 0}"
               th:href="@{'/users?page=' + ${currentPage - 1}}">
                Previous
            </a>

            <span class="muted">
                Page <b th:text="${currentPage + 1}"></b>
                of <b th:text="${totalPages}"></b>
            </span>

            <a class="btn"
               th:if="${currentPage < totalPages - 1}"
               th:href="@{'/users?page=' + ${currentPage + 1}}">
                Next
            </a>

        </div>

    </main>
</div>

</body>
</html>
