<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <link rel="stylesheet" th:href="@{/css/driveza-app.css}">
</head>

<body class="adminBg">
<div class="adminOverlay"></div>

<div class="adminContent">
    <div th:replace="admin/header :: adminHeader('/users')"></div>
    <main class="container">
        <section class="pageHead card pad">
            <div>
                <h1 class="pageTitle">Edit user</h1>
                <p class="pageSub">Editing a user account</p>
            </div>
        </section>

        <section class="card pad">
            <form th:action="@{${formAction}}"
                  th:object="${user}"
                  method="post">

                <input type="hidden" th:field="*{id}"/>


                <div class="field">
                    <label class="label" for="name" >Full name</label>
                    <input class="input" id="name" type="text" th:field="*{name}" required/>
                </div>

                <div class="field">
                    <label class="label" for="email">Email</label>
                    <input class="input" id="email" type="email" th:field="*{email}" required/>
                </div>

                <div class="field">
                    <label class="label" for="role">Role</label>
                    <select id="role" class="select" th:field="*{role}">
                        <option th:each="r : ${T(com.team3.driveza.model.enums.Role).values()}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <div class="field">
                    <label class="label" for="date">Date of birth</label>
                    <input class="input" id="date" type="date" th:field="*{dob}"/>
                </div>

                <div class="field">
                    <label class="label" for="password">Password</label>
                    <input class="input" id="password" type="password" th:field="*{password}" placeholder="Leave empty to keep current"/>
                </div>

                <button class="btn" type="submit">Save User</button>

            </form>
        </section>
    </main>
</div>

</body>
</html>
